    <style> 
        /* 1. Hiệu ứng đung đưa cho 2 câu đối */
@keyframes swing {
  0% { transform: rotate(2deg); }
  50% { transform: rotate(-2deg); }
  100% { transform: rotate(2deg); }
}
.cau-doi-anim {
  transform-origin: top center;
  animation: swing 3s ease-in-out infinite;
}

/* 2. Hiệu ứng "thở" (tỏa sáng) cho Vùng thả file */
@keyframes pulse-glow {
  0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.6); }
  70% { box-shadow: 0 0 0 15px rgba(234, 179, 8, 0); }
  100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
}
.dropzone-breathing {
  animation: pulse-glow 2s infinite;
  border-color: #eab308 !important; /* Màu vàng rực */
  transform: scale(1.02);
  transition: all 0.3s ease;
}

/* 3. Hiệu ứng gợn sóng khi click nút */
.btn-ripple {
  position: relative;
  overflow: hidden;
  transition: background 400ms;
}
.btn-ripple:active {
  background-size: 100%;
  transition: background 0s;
}
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fefce8; /* yellow-50 */
            background-image: radial-gradient(#fde047 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .font-tet-title {
            font-family: 'Playfair Display', serif;
        }
        .font-tet-script {
            font-family: 'Dancing Script', cursive;
        }
