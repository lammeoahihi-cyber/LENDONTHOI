    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
            background-attachment: fixed;
            transition: background 0.5s ease, color 0.5s ease, background-color 0.5s ease;
        }
        /* Ocean Theme Specific Styles */
        body.theme-ocean {
            background-color: #0c4a6e; /* Clear blue water base */
            background-image: linear-gradient(to bottom, #38bdf8, #0ea5e9, #0284c7, #0369a1, #0c4a6e);
            background-size: 100% 100%;
            color: #f0f9ff;
        }
        body.theme-ocean::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 70%),
                        linear-gradient(115deg, transparent 43%, rgba(255, 255, 255, 0.04) 47%, rgba(255, 255, 255, 0.04) 53%, transparent 57%);
            background-size: 200% 100%;
            pointer-events: none;
            z-index: -1;
            animation: sunRays 12s ease-in-out infinite;
        }
        /* Tet Theme Specific Styles */
        body.theme-tet {
            background-color: #fefce8; /* yellow-50 */
            background-image: radial-gradient(#fde047 1px, transparent 1px);
            background-size: 24px 24px;
            color: #78350f; /* amber-900 */
        }
        body.theme-tet::before {
            display: none;
        }
        @keyframes sunRays {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 0%; }
            100% { background-position: 0% 0%; }
        }
        .font-tet-title {
            font-family: 'Playfair Display', serif;
        }
        .font-tet-script {
            font-family: 'Dancing Script', cursive;
        }
    </style>
